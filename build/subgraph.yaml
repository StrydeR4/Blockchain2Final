specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: ResourceAMM
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ResourceAMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
        - LiquidityPosition
      abis:
        - name: ResourceAMM
          file: ResourceAMM\ResourceAMM.json
      eventHandlers:
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Swapped(indexed address,indexed address,uint256,uint256)
          handler: handleSwapped
      file: ResourceAMM\ResourceAMM.wasm
  - kind: ethereum
    name: GameGovernor
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: GameGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: GameGovernor
          file: GameGovernor\GameGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
      file: GameGovernor\GameGovernor.wasm
